<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cadastro – Diário do Torcedor</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={theme:{extend:{colors:{brand:{green:'#1a7a2e',yellow:'#f5c518',dark:'#0d0d0d',card:'#161616',border:'#2a2a2a'}}}}}</script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    body{background:#0d0d0d;font-family:'Inter',sans-serif;}
    .glow-yellow{box-shadow:0 0 20px rgba(245,197,24,.35);}
    .glow-green{box-shadow:0 0 30px rgba(26,122,46,.4);}
  </style>
</head>
<body class="min-h-screen flex items-center justify-center px-4">
  <div class="fixed inset-0 overflow-hidden pointer-events-none">
    <div class="absolute bottom-0 left-0 right-0 h-64 bg-gradient-to-t from-green-900/30 to-transparent"></div>
    <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-96 h-96 bg-green-900/10 rounded-full blur-3xl"></div>
  </div>

  <div class="relative w-full max-w-sm">
    <!-- Logo -->
    <div class="flex flex-col items-center mb-10">
      <div class="w-20 h-20 bg-gradient-to-br from-[#1a7a2e] to-green-900 rounded-3xl flex items-center justify-center glow-green mb-5 border border-green-700/40">
        <svg viewBox="0 0 60 70" class="w-12 h-12" fill="none">
          <path d="M30 2 L58 14 L58 36 C58 52 44 64 30 68 C16 64 2 52 2 36 L2 14 Z" fill="#1a7a2e" stroke="#f5c518" stroke-width="2"/>
          <path d="M20 22 L40 22 L37 40 L23 40 Z" fill="#f5c518"/>
        </svg>
      </div>
      <h1 class="text-white text-2xl font-bold tracking-wide">Criar Conta</h1>
      <p class="text-gray-500 text-sm mt-1">Junte-se à maior torcida do mundo</p>
    </div>

    <!-- Card -->
    <div class="bg-[#161616] rounded-3xl p-7 border border-[#2a2a2a]">
      
      <!-- Erro Box -->
      <div id="error-box" class="hidden mb-4 p-3 bg-red-900/30 border border-red-500/50 rounded-xl text-red-400 text-sm text-center"></div>

      <div class="relative mb-4">
        <span class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-500">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
        </span>
        <input type="text" id="nome" placeholder="Seu nome" class="w-full bg-black/40 border border-[#2a2a2a] text-white placeholder-gray-500 rounded-xl py-3.5 pl-12 pr-4 text-sm focus:outline-none focus:border-[#f5c518] transition" />
      </div>

      <div class="relative mb-4">
        <span class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-500">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 12a4 4 0 10-8 0 4 4 0 008 0zm0 0v1.5a2.5 2.5 0 005 0V12a9 9 0 10-9 9m4.5-1.206a8.959 8.959 0 01-4.5 1.207"/></svg>
        </span>
        <input type="email" id="email" placeholder="E-mail" class="w-full bg-black/40 border border-[#2a2a2a] text-white placeholder-gray-500 rounded-xl py-3.5 pl-12 pr-4 text-sm focus:outline-none focus:border-[#f5c518] transition" />
      </div>

      <div class="relative mb-6">
        <span class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-500">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
        </span>
        <input type="password" id="password" placeholder="Senha" class="w-full bg-black/40 border border-[#2a2a2a] text-white placeholder-gray-500 rounded-xl py-3.5 pl-12 pr-12 text-sm focus:outline-none focus:border-[#f5c518] transition" />
      </div>

      <button id="btn-cadastrar" onclick="cadastrar()" class="w-full bg-[#f5c518] text-black font-bold py-3.5 rounded-xl text-base glow-yellow hover:brightness-110 transition disabled:opacity-50">
        Cadastrar
      </button>

    </div>
    <p class="text-center text-gray-500 text-sm mt-6">Já tem uma conta? <a href="login_html.html" class="text-[#f5c518] font-semibold hover:underline ml-1">Fazer login</a></p>
  </div>

<script>
async function cadastrar() {
  const nome = document.getElementById('nome').value.trim();
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const btn = document.getElementById('btn-cadastrar');
  const errorBox = document.getElementById('error-box');

  errorBox.classList.add('hidden');

  if (!nome || !email || !password) {
    errorBox.textContent = 'Preencha todos os campos.';
    errorBox.classList.remove('hidden');
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Criando conta...';

  try {
    const response = await fetch('https://copa-back.vercel.app/api/auth/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ nome, email, password })
    });

    const data = await response.json();

    if (!response.ok) {
      throw new Error(data.message || data.error_description || 'Erro ao criar conta.');
    }

    // Sucesso, redireciona pro login
    alert('Conta criada com sucesso! Faça login para continuar.');
    window.location.href = 'login_html.html';

  } catch (error) {
    console.error(error);
    errorBox.textContent = error.message;
    errorBox.classList.remove('hidden');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Cadastrar';
  }
}
</script>
</body>
</html>
