<!-- ========= MODAL: EDITAR NOME ========= -->
<div id="modal-edit" class="modal-overlay fixed inset-0 z-[100] hidden flex items-center justify-center px-4">
  <div onclick="fecharEditarNome()" class="absolute inset-0 bg-black/70 backdrop-blur-sm"></div>
  <div class="relative z-10 w-full max-w-sm bg-[#161616] rounded-3xl p-6 border border-[#2a2a2a]">
    <h3 class="text-white font-bold text-lg mb-1">Editar perfil</h3>
    <p class="text-gray-500 text-sm mb-5">Altere seu nome de exibição</p>

    <!-- Erro Box -->
    <div id="edit-error" class="hidden mb-4 p-3 bg-red-900/30 border border-red-500/50 rounded-xl text-red-400 text-sm text-center"></div>

    <!-- Sucesso Box -->
    <div id="edit-success" class="hidden mb-4 p-3 bg-green-900/30 border border-green-500/50 rounded-xl text-green-400 text-sm text-center"></div>

    <div class="relative mb-5">
      <span class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-500">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
      </span>
      <input type="text" id="edit-nome" placeholder="Novo nome" class="w-full bg-black/40 border border-[#2a2a2a] text-white placeholder-gray-500 rounded-xl py-3.5 pl-12 pr-4 text-sm focus:outline-none focus:border-[#f5c518] transition" />
    </div>

    <div class="flex gap-3">
      <button onclick="fecharEditarNome()" class="flex-1 bg-[#2a2a2a] text-gray-300 font-semibold py-3 rounded-xl text-sm hover:bg-[#333] transition">Cancelar</button>
      <button id="btn-salvar-nome" onclick="salvarNome()" class="flex-1 bg-[#f5c518] text-black font-bold py-3 rounded-xl text-sm hover:brightness-110 transition disabled:opacity-50">Salvar</button>
    </div>
  </div>
</div>

<!-- ========= TOAST ========= -->
<div id="toast" class="fixed top-6 left-1/2 -translate-x-1/2 z-[200] bg-[#1a7a2e] text-white text-sm font-semibold px-5 py-3 rounded-2xl shadow-2xl flex items-center gap-2 opacity-0 pointer-events-none transition-all duration-300">
  <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
  <span id="toast-text">Salvo com sucesso!</span>
</div>

<script>
  const API_URL = 'https://copa-back.vercel.app/api';

  // Proteção de rota
  if (!localStorage.getItem('usuario_id')) {
    window.location.href = 'login_html.html';
  }

  // Preenche o perfil com os dados do usuário logado
  const nome = localStorage.getItem('usuario_nome') || 'Torcedor';
  const email = localStorage.getItem('usuario_email') || '';

  const nomeFormatado = '@' + nome.toLowerCase().replace(/\s+/g, '');
  document.getElementById('perfil-nome').textContent = nomeFormatado;
  document.getElementById('perfil-email').textContent = email;

  // Avatar com iniciais
  document.getElementById('perfil-avatar').src =
    `https://ui-avatars.com/api/?name=${encodeURIComponent(nome)}&background=1a7a2e&color=fff&size=96`;

  // Contar posts do usuário
  async function contarMeusPosts() {
    try {
      const response = await fetch(API_URL + '/posts');
      const posts = await response.json();
      const meuNome = localStorage.getItem('usuario_nome');
      const meusPosts = posts.filter(p => p.usuario_id === meuNome);
      document.getElementById('stat-posts').textContent = meusPosts.length;
    } catch (e) {
      console.error(e);
    }
  }
  contarMeusPosts();

  // ===== MODAL EDITAR NOME =====
  const modalEdit = document.getElementById('modal-edit');

  function abrirEditarNome() {
    document.getElementById('edit-nome').value = localStorage.getItem('usuario_nome') || '';
    document.getElementById('edit-error').classList.add('hidden');
    document.getElementById('edit-success').classList.add('hidden');
    modalEdit.classList.remove('hidden');
    modalEdit.classList.add('open', 'flex');
    document.getElementById('edit-nome').focus();
  }

  function fecharEditarNome() {
    modalEdit.classList.add('hidden');
    modalEdit.classList.remove('open', 'flex');
  }

  async function salvarNome() {
    const novoNome = document.getElementById('edit-nome').value.trim();
    const btn = document.getElementById('btn-salvar-nome');
    const errorBox = document.getElementById('edit-error');
    const successBox = document.getElementById('edit-success');

    errorBox.classList.add('hidden');
    successBox.classList.add('hidden');

    if (!novoNome) {
      errorBox.textContent = 'Digite um nome.';
      errorBox.classList.remove('hidden');
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Salvando...';

    try {
      const response = await fetch(API_URL + '/auth/update', {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          usuario_id: localStorage.getItem('usuario_id'),
          nome: novoNome
        })
      });

      const data = await response.json();

      if (!response.ok) {
        throw new Error(data.message || 'Erro ao atualizar nome.');
      }

      // Atualiza localStorage
      localStorage.setItem('usuario_nome', novoNome);

      // Atualiza a tela
      const nomeAtualizado = '@' + novoNome.toLowerCase().replace(/\s+/g, '');
      document.getElementById('perfil-nome').textContent = nomeAtualizado;
      document.getElementById('perfil-avatar').src =
        `https://ui-avatars.com/api/?name=${encodeURIComponent(novoNome)}&background=1a7a2e&color=fff&size=96`;

      // Mostra toast
      mostrarToast('Nome atualizado com sucesso!');
      fecharEditarNome();

    } catch (error) {
      console.error(error);
      errorBox.textContent = error.message;
      errorBox.classList.remove('hidden');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Salvar';
    }
  }

  // ===== TOAST =====
  function mostrarToast(texto) {
    const toast = document.getElementById('toast');
    document.getElementById('toast-text').textContent = texto;
    toast.classList.remove('opacity-0', 'pointer-events-none');
    setTimeout(() => toast.classList.add('opacity-0', 'pointer-events-none'), 3000);
  }

  // ===== SAIR =====
  function sair() {
    localStorage.removeItem('usuario_id');
    localStorage.removeItem('usuario_nome');
    localStorage.removeItem('usuario_email');
    window.location.href = 'login_html.html';
  }
</script>
