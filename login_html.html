<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login – Diário do Torcedor</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={theme:{extend:{colors:{brand:{green:'#1a7a2e',yellow:'#f5c518',dark:'#0d0d0d',card:'#161616',border:'#2a2a2a'}}}}}</script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    body{background:#0d0d0d;font-family:'Inter',sans-serif;}
    .glow-yellow{box-shadow:0 0 20px rgba(245,197,24,.35);}
    .glow-green{box-shadow:0 0 30px rgba(26,122,46,.4);}
  </style>
</head>
<body class="min-h-screen flex items-center justify-center px-4">
  <div class="fixed inset-0 overflow-hidden pointer-events-none">
    <div class="absolute bottom-0 left-0 right-0 h-64 bg-gradient-to-t from-green-900/30 to-transparent"></div>
    <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-96 h-96 bg-green-900/10 rounded-full blur-3xl"></div>
  </div>

  <div class="relative w-full max-w-sm">
    <!-- Logo -->
    <div class="flex flex-col items-center mb-10">
      <div class="w-28 h-28 bg-gradient-to-br from-[#1a7a2e] to-green-900 rounded-3xl flex items-center justify-center glow-green mb-5 border border-green-700/40">
        <svg viewBox="0 0 60 70" class="w-16 h-16" fill="none">
          <path d="M30 2 L58 14 L58 36 C58 52 44 64 30 68 C16 64 2 52 2 36 L2 14 Z" fill="#1a7a2e" stroke="#f5c518" stroke-width="2"/>
          <path d="M20 22 L40 22 L37 40 L23 40 Z" fill="#f5c518"/>
          <rect x="26" y="40" width="8" height="6" fill="#f5c518"/>
          <rect x="22" y="46" width="16" height="3" rx="1.5" fill="#f5c518"/>
          <path d="M20 26 C14 26 14 36 20 36" stroke="#f5c518" stroke-width="2.5" fill="none" stroke-linecap="round"/>
          <path d="M40 26 C46 26 46 36 40 36" stroke="#f5c518" stroke-width="2.5" fill="none" stroke-linecap="round"/>
          <text x="23" y="20" font-size="8" fill="#f5c518">★★</text>
        </svg>
      </div>
      <h1 class="text-white text-2xl font-bold tracking-wide">Diário do Torcedor</h1>
      <p class="text-gray-500 text-sm mt-1">Sua paixão pelo futebol em um só lugar</p>
    </div>

    <!-- Card -->
    <div class="bg-[#161616] rounded-3xl p-7 border border-[#2a2a2a]">
      <!-- Erro Box -->
      <div id="error-box" class="hidden mb-4 p-3 bg-red-900/30 border border-red-500/50 rounded-xl text-red-400 text-sm text-center"></div>

      <div class="relative mb-4">
        <span class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-500">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 12a4 4 0 10-8 0 4 4 0 008 0zm0 0v1.5a2.5 2.5 0 005 0V12a9 9 0 10-9 9m4.5-1.206a8.959 8.959 0 01-4.5 1.207"/></svg>
        </span>
        <input type="email" id="email" placeholder="E-mail" class="w-full bg-black/40 border border-[#2a2a2a] text-white placeholder-gray-500 rounded-xl py-3.5 pl-12 pr-4 text-sm focus:outline-none focus:border-[#f5c518] transition" />
      </div>
      <div class="relative mb-2">
        <span class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-500">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
        </span>
        <input type="password" id="password" placeholder="Senha" class="w-full bg-black/40 border border-[#2a2a2a] text-white placeholder-gray-500 rounded-xl py-3.5 pl-12 pr-12 text-sm focus:outline-none focus:border-[#f5c518] transition" />
        <button class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-500"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg></button>
      </div>
      <div class="text-right mb-6"><a href="#" class="text-[#f5c518] text-sm hover:underline">Esqueceu sua senha?</a></div>
      <button id="btn-login" onclick="login()" class="w-full bg-[#f5c518] text-black font-bold py-3.5 rounded-xl text-base glow-yellow hover:brightness-110 transition disabled:opacity-50 mb-5">Entrar</button>
      <div class="flex items-center gap-3 mb-5"><div class="flex-1 h-px bg-[#2a2a2a]"></div><span class="text-gray-500 text-xs">ou continue com</span><div class="flex-1 h-px bg-[#2a2a2a]"></div></div>
      <div class="flex gap-3">
        <button class="flex-1 flex items-center justify-center gap-2 bg-black/40 border border-[#2a2a2a] rounded-xl py-3 text-white text-sm hover:border-gray-600 transition">
          <svg class="w-5 h-5" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
          Google
        </button>
        <button class="flex-1 flex items-center justify-center gap-2 bg-black/40 border border-[#2a2a2a] rounded-xl py-3 text-white text-sm hover:border-gray-600 transition">
          <svg class="w-5 h-5" viewBox="0 0 24 24" fill="white"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/></svg>
          Apple
        </button>
      </div>
    </div>
    <p class="text-center text-gray-500 text-sm mt-6">Não tem uma conta? <a href="cadastro_html.html" class="text-[#f5c518] font-semibold hover:underline ml-1">Cadastre-se</a></p>
  </div>

<script>
async function login() {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const btn = document.getElementById('btn-login');
  const errorBox = document.getElementById('error-box');

  errorBox.classList.add('hidden');

  if (!email || !password) {
    errorBox.textContent = 'Preencha todos os campos.';
    errorBox.classList.remove('hidden');
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Entrando...';

  try {
    const response = await fetch('https://copa-back.vercel.app/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });

    const data = await response.json();

    if (!response.ok) {
      throw new Error(data.message || data.error_description || 'E-mail ou senha inválidos.');
    }

    // Sucesso, salva os dados do usuário e vai pro index
    localStorage.setItem('usuario_id', data.user.id);
    localStorage.setItem('usuario_nome', data.nome);
    localStorage.setItem('usuario_email', data.user.email);
    
    // Apenas redireciona
    window.location.href = 'index_html.html';

  } catch (error) {
    console.error(error);
    errorBox.textContent = error.message;
    errorBox.classList.remove('hidden');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Entrar';
  }
}
</script>
</body>
</html>
