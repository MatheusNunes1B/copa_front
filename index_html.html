<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Início – Diário do Torcedor</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: { green: '#1a7a2e', yellow: '#f5c518', dark: '#0d0d0d', card: '#161616', border: '#2a2a2a' }
          }
        }
      }
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    body { background: #0d0d0d; font-family: 'Inter', sans-serif; }
    ::-webkit-scrollbar { width: 0; }
    .story-ring { background: linear-gradient(135deg, #f5c518, #1a7a2e); padding: 2px; border-radius: 9999px; }
    #modal-post { transition: opacity .25s ease, transform .25s ease; }
    #modal-post.hidden { opacity:0; pointer-events:none; }
    #modal-post.open   { opacity:1; pointer-events:all; }
    #modal-sheet { transition: transform .3s cubic-bezier(.4,0,.2,1); }
    #preview-img { display:none; }
    .nav-active { color:#f5c518; }
  </style>
</head>
<body class="min-h-screen text-white flex justify-center">
<div class="w-full max-w-sm flex flex-col min-h-screen relative">

  <!-- ========= TOP BAR ========= -->
  <header class="sticky top-0 z-40 bg-[#0d0d0d]/95 backdrop-blur border-b border-[#2a2a2a] flex items-center justify-between px-4 py-3">
    <button class="text-white">
      <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
    </button>
    <div class="flex items-center gap-2">
      <span class="text-[#f5c518] text-xl">🏆</span>
      <span class="text-white font-bold text-base">Diário do Torcedor</span>
    </div>
    <button class="relative text-white">
      <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/></svg>
      <span class="absolute -top-1 -right-1 bg-red-500 text-white text-[9px] font-bold rounded-full w-4 h-4 flex items-center justify-center">3</span>
    </button>
  </header>

  <!-- ========= TABS ========= -->
  <div class="flex px-4 pt-3 pb-1 gap-6 border-b border-[#2a2a2a]">
    <button class="text-white font-semibold text-sm pb-2 border-b-2 border-[#f5c518]">Para você</button>
    <button class="text-gray-500 text-sm pb-2">Seguindo</button>
    <button class="text-gray-500 text-sm pb-2 flex items-center gap-1">COPA 2022 🏆</button>
  </div>

  <!-- ========= STORIES ========= -->
  <div class="flex gap-3 px-4 py-3 overflow-x-auto">
    <div class="flex flex-col items-center flex-shrink-0 gap-1">
      <div class="story-ring">
        <div class="w-14 h-14 rounded-full bg-[#161616] flex items-center justify-center border-2 border-[#0d0d0d] relative">
          <span class="text-2xl">👤</span>
          <span class="absolute bottom-0 right-0 bg-[#f5c518] rounded-full w-5 h-5 flex items-center justify-center text-black text-xs font-bold">+</span>
        </div>
      </div>
      <span class="text-gray-400 text-[10px]">Seu story</span>
    </div>
    <div class="flex flex-col items-center flex-shrink-0 gap-1">
      <div class="story-ring"><img src="https://i.pravatar.cc/56?img=12" class="w-14 h-14 rounded-full border-2 border-[#0d0d0d] object-cover" /></div>
      <span class="text-gray-400 text-[10px]">@gui.costa</span>
    </div>
    <div class="flex flex-col items-center flex-shrink-0 gap-1">
      <div class="story-ring"><img src="https://i.pravatar.cc/56?img=44" class="w-14 h-14 rounded-full border-2 border-[#0d0d0d] object-cover" /></div>
      <span class="text-gray-400 text-[10px]">@lara.nu…</span>
    </div>
    <div class="flex flex-col items-center flex-shrink-0 gap-1">
      <div class="story-ring"><img src="https://i.pravatar.cc/56?img=33" class="w-14 h-14 rounded-full border-2 border-[#0d0d0d] object-cover" /></div>
      <span class="text-gray-400 text-[10px]">@brunod…</span>
    </div>
    <div class="flex flex-col items-center flex-shrink-0 gap-1">
      <div class="story-ring"><img src="https://i.pravatar.cc/56?img=5" class="w-14 h-14 rounded-full border-2 border-[#0d0d0d] object-cover" /></div>
      <span class="text-gray-400 text-[10px]">@anapaul…</span>
    </div>
  </div>

  <!-- ========= FEED ========= -->
  <div class="flex-1 overflow-y-auto pb-28 space-y-1" id="feed">
    <div class="flex justify-center items-center py-10">
      <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-[#f5c518]"></div>
    </div>
  </div><!-- end feed -->

  <!-- ========= BOTTOM NAV ========= -->
  <nav class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-sm bg-[#0d0d0d]/95 backdrop-blur border-t border-[#2a2a2a] flex items-center justify-around py-2 z-50">
    <a href="index_html.html" class="flex flex-col items-center gap-1 nav-active">
      <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
      <span class="text-[10px] font-medium">Início</span>
    </a>
    <a href="jogos_html.html" class="flex flex-col items-center gap-1 text-gray-500">
      <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9" stroke-width="2"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3"/></svg>
      <span class="text-[10px]">Jogos</span>
    </a>
    <!-- + BUTTON -->
    <button onclick="openModal()" class="w-13 h-13 w-12 h-12 bg-[#f5c518] rounded-full flex items-center justify-center shadow-lg -mt-4 hover:brightness-110 transition">
      <svg class="w-7 h-7 text-black" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v16m8-8H4"/></svg>
    </button>
    <a href="chat_html.html" class="flex flex-col items-center gap-1 text-gray-500 relative">
      <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/></svg>
      <span class="absolute -top-1 left-5 bg-red-500 text-white text-[9px] font-bold rounded-full w-4 h-4 flex items-center justify-center">6</span>
      <span class="text-[10px]">Chat</span>
    </a>
    <a href="perfil_html.html" class="flex flex-col items-center gap-1 text-gray-500">
      <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
      <span class="text-[10px]">Perfil</span>
    </a>
  </nav>

</div><!-- end wrapper -->

<!-- ========================================================
     MODAL: NOVA PUBLICAÇÃO
     ======================================================== -->
<div id="modal-post" class="fixed inset-0 z-[100] hidden flex flex-col justify-end" role="dialog" aria-modal="true">
  <!-- Backdrop -->
  <div id="modal-backdrop" onclick="closeModal()" class="absolute inset-0 bg-black/70 backdrop-blur-sm"></div>

  <!-- Sheet -->
  <div id="modal-sheet" class="relative z-10 w-full max-w-sm mx-auto bg-[#161616] rounded-t-3xl overflow-hidden">

    <!-- Handle -->
    <div class="flex justify-center pt-3 pb-1"><div class="w-10 h-1 bg-[#2a2a2a] rounded-full"></div></div>

    <!-- Header -->
    <div class="flex items-center justify-between px-5 py-3 border-b border-[#2a2a2a]">
      <button onclick="closeModal()" class="text-gray-400 hover:text-white transition text-sm">Cancelar</button>
      <span class="text-white font-bold text-base">Nova publicação</span>
      <button id="btn-publicar" onclick="publicar()" class="bg-[#f5c518] text-black font-bold text-sm px-4 py-1.5 rounded-full hover:brightness-110 transition disabled:opacity-40" disabled>Publicar</button>
    </div>

    <!-- Author row -->
    <div class="flex items-center gap-3 px-5 pt-4 pb-2">
      <img src="https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=44&h=44&fit=crop&crop=face" class="w-11 h-11 rounded-full object-cover ring-2 ring-[#1a7a2e]" />
      <div>
        <p class="text-white font-semibold text-sm">@gui-costa</p>
        <!-- Audience selector -->
        <button class="flex items-center gap-1 mt-0.5 bg-[#2a2a2a] rounded-full px-2 py-0.5 text-[10px] text-gray-300 hover:bg-[#333] transition">
          <svg class="w-3 h-3" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>
          Público ▾
        </button>
      </div>
    </div>

    <!-- Text area -->
    <div class="px-5 pb-2">
      <textarea id="post-text" rows="4" placeholder="O que está acontecendo no mundo do futebol? ⚽"
        oninput="checkForm()"
        class="w-full bg-transparent text-white placeholder-gray-500 text-base resize-none focus:outline-none leading-relaxed"></textarea>
    </div>

    <!-- Image preview -->
    <div id="preview-wrap" class="px-5 pb-3 hidden">
      <div class="relative inline-block">
        <img id="preview-img" src="" alt="preview" class="rounded-2xl max-h-52 object-cover w-full" />
        <button onclick="removeImage()" class="absolute top-2 right-2 bg-black/70 rounded-full p-1 hover:bg-black transition">
          <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
        </button>
      </div>
    </div>

    <!-- Hashtag suggestions -->
    <div class="flex gap-2 px-5 pb-3 overflow-x-auto">
      <button onclick="addTag('#BrasilNaCopa')" class="flex-shrink-0 bg-[#1a7a2e]/20 border border-[#1a7a2e]/50 text-[#1a7a2e] text-xs px-3 py-1 rounded-full hover:bg-[#1a7a2e]/30 transition">#BrasilNaCopa</button>
      <button onclick="addTag('#Copa2022')" class="flex-shrink-0 bg-[#1a7a2e]/20 border border-[#1a7a2e]/50 text-[#1a7a2e] text-xs px-3 py-1 rounded-full hover:bg-[#1a7a2e]/30 transition">#Copa2022</button>
      <button onclick="addTag('#Hexa')" class="flex-shrink-0 bg-[#1a7a2e]/20 border border-[#1a7a2e]/50 text-[#1a7a2e] text-xs px-3 py-1 rounded-full hover:bg-[#1a7a2e]/30 transition">#Hexa</button>
      <button onclick="addTag('#Seleção')" class="flex-shrink-0 bg-[#1a7a2e]/20 border border-[#1a7a2e]/50 text-[#1a7a2e] text-xs px-3 py-1 rounded-full hover:bg-[#1a7a2e]/30 transition">#Seleção</button>
    </div>

    <!-- Divider -->
    <div class="h-px bg-[#2a2a2a] mx-5"></div>

    <!-- Toolbar -->
    <div class="flex items-center gap-1 px-4 py-3">
      <!-- Image upload -->
      <label class="flex items-center justify-center w-10 h-10 rounded-xl hover:bg-white/5 transition cursor-pointer" title="Adicionar foto">
        <svg class="w-6 h-6 text-[#1a7a2e]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="3" stroke-width="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 15l-5-5L5 21"/></svg>
        <input type="file" accept="image/*" class="hidden" onchange="previewImage(event)" />
      </label>
      <!-- Emoji -->
      <button onclick="insertEmoji()" class="flex items-center justify-center w-10 h-10 rounded-xl hover:bg-white/5 transition" title="Emoji">
        <svg class="w-6 h-6 text-[#f5c518]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" stroke-width="2"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 13s1.5 2 4 2 4-2 4-2M9 9h.01M15 9h.01"/></svg>
      </button>
      <!-- Location -->
      <button class="flex items-center justify-center w-10 h-10 rounded-xl hover:bg-white/5 transition" title="Localização">
        <svg class="w-6 h-6 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/><circle cx="12" cy="11" r="3"/></svg>
      </button>
      <!-- Poll -->
      <button class="flex items-center justify-center w-10 h-10 rounded-xl hover:bg-white/5 transition" title="Enquete">
        <svg class="w-6 h-6 text-purple-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
      </button>

      <div class="flex-1"></div>

      <!-- Char counter -->
      <span id="char-count" class="text-gray-500 text-xs">0/280</span>
    </div>

  </div><!-- end sheet -->
</div><!-- end modal -->

<!-- ========= TOAST ========= -->
<div id="toast" class="fixed top-6 left-1/2 -translate-x-1/2 z-[200] bg-[#1a7a2e] text-white text-sm font-semibold px-5 py-3 rounded-2xl shadow-2xl flex items-center gap-2 opacity-0 pointer-events-none transition-all duration-300">
  <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
  Publicado com sucesso!
</div>

<script>
  const modal = document.getElementById('modal-post');
  const sheet = document.getElementById('modal-sheet');

  function openModal() {
    modal.classList.remove('hidden');
    modal.classList.add('open', 'flex');
    setTimeout(() => sheet.style.transform = 'translateY(0)', 10);
    document.getElementById('post-text').focus();
  }

  function closeModal() {
    sheet.style.transform = 'translateY(100%)';
    setTimeout(() => {
      modal.classList.add('hidden');
      modal.classList.remove('open', 'flex');
      document.getElementById('post-text').value = '';
      removeImage();
      checkForm();
    }, 300);
  }

  function checkForm() {
    const text = document.getElementById('post-text').value.trim();
    const img  = document.getElementById('preview-img').src;
    const hasImg = document.getElementById('preview-wrap').style.display !== 'none' && document.getElementById('preview-wrap').className.indexOf('hidden') === -1;
    const btn = document.getElementById('btn-publicar');
    const cc  = document.getElementById('char-count');
    cc.textContent = text.length + '/280';
    cc.style.color = text.length > 260 ? '#ef4444' : '#6b7280';
    btn.disabled = text.length === 0 || text.length > 280;
  }

  function previewImage(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      const img = document.getElementById('preview-img');
      img.src = ev.target.result;
      document.getElementById('preview-wrap').classList.remove('hidden');
      checkForm();
    };
    reader.readAsDataURL(file);
  }

  function removeImage() {
    document.getElementById('preview-img').src = '';
    document.getElementById('preview-wrap').classList.add('hidden');
    checkForm();
  }

  function addTag(tag) {
    const ta = document.getElementById('post-text');
    if (!ta.value.includes(tag)) {
      ta.value += (ta.value && !ta.value.endsWith(' ') ? ' ' : '') + tag + ' ';
    }
    ta.focus();
    checkForm();
  }

  const emojis = ['⚽','🏆','🇧🇷','💚','💛','🔥','🎉','🏟️','⭐','👏'];
  let emojiIdx = 0;
  function insertEmoji() {
    const ta = document.getElementById('post-text');
    ta.value += emojis[emojiIdx++ % emojis.length];
    ta.focus();
    checkForm();
  }

  const API_URL = 'https://copaback.vercel.app/api/posts';

  async function carregarPosts() {
    const feed = document.getElementById('feed');
    try {
      const response = await fetch(API_URL);
      const posts = await response.json();
      
      feed.innerHTML = '';

      if (!posts || posts.length === 0) {
        feed.innerHTML = '<p class="text-center text-gray-500 mt-10">Nenhum post encontrado. Seja o primeiro a publicar! ⚽</p>';
        return;
      }

      posts.forEach(post => {
        const article = document.createElement('article');
        article.className = 'bg-[#161616] border-b border-[#2a2a2a]';
        
        // Formatar data
        let dataFormatada = 'Agora mesmo';
        if (post.created_at) {
            const data = new Date(post.created_at);
            dataFormatada = data.toLocaleDateString('pt-BR') + ' às ' + data.toLocaleTimeString('pt-BR', {hour: '2-digit', minute:'2-digit'});
        }

        const avatarSeed = post.usuario_id ? post.usuario_id : 'Anonimo';

        article.innerHTML = `
          <div class="flex items-center gap-3 px-4 pt-4 pb-3">
            <img src="https://ui-avatars.com/api/?name=${avatarSeed}&background=1a7a2e&color=fff" class="w-10 h-10 rounded-full object-cover ring-2 ring-[#1a7a2e]" />
            <div class="flex-1">
              <div class="flex items-center gap-1">
                <span class="font-semibold text-sm">@${post.usuario_id || 'torcedor'}</span>
              </div>
              <p class="text-gray-400 text-xs">${dataFormatada}</p>
            </div>
            <button class="text-gray-500">···</button>
          </div>
          <p class="px-4 pb-3 text-sm leading-relaxed">${post.texto || ''}</p>
          ${post.imagem ? `<img src="${post.imagem}" class="w-full object-cover" />` : ''}
          <div class="flex items-center gap-5 px-4 py-3">
            <button class="flex items-center gap-1.5 text-gray-400 text-sm hover:text-red-400 transition"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/></svg>Curtir</button>
          </div>
        `;
        feed.appendChild(article);
      });
    } catch (error) {
      console.error('Erro ao carregar posts:', error);
      feed.innerHTML = '<p class="text-center text-red-500 mt-10">Erro ao carregar os posts.</p>';
    }
  }

  async function publicar() {
    const text = document.getElementById('post-text').value.trim();
    const btn = document.getElementById('btn-publicar');

    if (!text) return;
    
    btn.disabled = true;
    const textoOriginal = btn.textContent;
    btn.textContent = 'Publicando...';

    try {
      const response = await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          texto: text,
          usuario_id: 'gui-costa' // mock user id
        })
      });

      if (!response.ok) throw new Error('Falha ao publicar');

      const data = await response.json();
      console.log('Post criado:', data);

      const toast = document.getElementById('toast');
      toast.classList.remove('opacity-0', 'pointer-events-none');
      setTimeout(() => toast.classList.add('opacity-0', 'pointer-events-none'), 3000);

      closeModal();
      carregarPosts(); 

    } catch (error) {
      console.error(error);
      alert('Erro ao publicar o post. Tente novamente.');
    } finally {
      btn.disabled = false;
      btn.textContent = textoOriginal;
    }
  }

  // Carregar posts assim que a tela abrir
  document.addEventListener('DOMContentLoaded', carregarPosts);
</script>





</body>
</html>
